# halal-filter — Blocklist Source Registry
#
# Lists are downloaded at build time by scripts/fetch_lists.sh,
# merged with our curated Islamic surveillance list, and compiled
# into filter.bin via build_filter.
#
# Tiers:
#   core     — Always included. Our curated Islamic app surveillance list.
#   standard — Included by default. Well-maintained, low false-positive community lists.
#   extended — Opt-in. Aggressive blocking for power users.
#
# License compliance:
#   - MIT/MPL/permissive: no restrictions on compiled binary
#   - GPL-3.0: build script is open-source, source URLs documented → compliant
#   - Proprietary/NC: NOT included (280blocker, DuckDuckGo Tracker Radar)

# =============================================================================
# CORE — Islamic App Surveillance (our unique value-add)
# =============================================================================

[[sources]]
name = "halal-filter-islamic"
url = "local://data/trackers/islamic_apps.txt"
format = "domains"
license = "MIT"
tier = "core"
description = "88 curated surveillance SDK domains from 21 Muslim app audits"

# =============================================================================
# STANDARD — Community ad/tracker lists (included by default)
# =============================================================================

[[sources]]
name = "steven-black-hosts"
url = "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
format = "hosts"
license = "MIT"
tier = "standard"
domains_approx = 77500
description = "Unified hosts file with ad + malware domains"

[[sources]]
name = "peter-lowe-adservers"
url = "https://pgl.yoyo.org/adservers/serverlist.php?hostformat=nohtml&showintro=0&mimetype=plaintext"
